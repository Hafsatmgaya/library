<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 class="my-library"> 📚 My Library 📖</h1>
    <button id="new-book-btn"> New book</button>
    <dialog id="new-book-dialog">
        <button id="close-btn">X</button>
            <form>
                <input type="text" placeholder="Book title" id="title">
                 <input type="text" placeholder="Name of author" id="author">
                  <input type="number" placeholder="Number of pages" id="pages">
                   <input type="checkbox" placeholder="Read/Not read" id="read">
                   <label for="read">Read?</label>
                <button id="add-book-btn" type="submit"> Add book</button>
            </form>
        </dialog>
    <div id="library-container"></div>
    <script src="script.js"></script>
</body>
</html>
